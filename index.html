<script src="https://cdn.tailwindcss.com"></script>
<!-- モーダルトリガーボタン -->
<button class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-md md:hidden" data-toggle="modal"
    data-target="#mobileNavModal">
    メニュー
</button>

<!-- モーダル -->
<div class="fixed top-0 left-0 right-0 bottom-0 z-40 hidden" id="mobileNavModal">
    <div class="bg-gray-900 opacity-75 absolute top-0 left-0 right-0 bottom-0"></div>
    <div class="bg-white absolute top-0 bottom-0 right-0 w-64 px-4 py-8 transition-all ease-in-out duration-300 transform translate-x-full"
        id="mobileNavContent">
        <button class="absolute top-4 right-4 text-gray-600 hover:text-gray-900" id="mobileNavCloseBtn">
            <svg class="w-6 h-6" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M19.06 4.94L12 12l7.06 7.06-1.06 1.06L12 13.06l-7.06 7.06-1.06-1.06L10.94 12 3.88 4.94l1.06-1.06L12 10.94l7.06-7.06z" />
            </svg>
        </button>
        <ul class="text-gray-900 text-xl font-bold">
            <li class="my-4">
                <a href="#" class="block">ホーム</a>
            </li>
            <li class="my-4">
                <a href="#" class="block">サービス</a>
            </li>
            <li class="my-4">
                <a href="#" class="block">お問い合わせ</a>
            </li>
        </ul>
    </div>
</div>

<!-- スマホ表示用のモーダルを表示するJavaScriptの設定 -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var mobileNavModal = document.getElementById('mobileNavModal');
        var mobileNavContent = document.getElementById('mobileNavContent');
        var mobileNavCloseBtn = document.getElementById('mobileNavCloseBtn');

        // モーダルを表示する関数
        function showMobileNavModal() {
            mobileNavModal.classList.remove('hidden');
            mobileNavContent.classList.remove('translate-x-full');
        }

        // モーダルを閉じる関数
        function hideMobileNavModal() {
            mobileNavModal.classList.add('hidden');
            mobileNavContent.classList.add('translate-x-full');
        }

        // モーダルを閉じるボタンのイベントリスナーを追加
        mobileNavCloseBtn.addEventListener('click', hideMobileNavModal);

        // モーダルを表示するトリガーボタンのイベントリスナーを追加
        document.querySelector('[data-target="#mobileNavModal"]').addEventListener('click', showMobileNavModal);
    });
</script>
